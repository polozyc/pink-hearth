<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const PHRASE = 'I love you';
const COLOR  = '#ff5ca8';
const FONT   = "11px 'Courier New', monospace";

function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
function heartY(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

// Exact raw bounds
const RAW_W  = 32;      // x: -16 to +16
const RAW_H  = 20.98;   // y: -8.66 to +12.32
const RAW_CY = 1.83;    // vertical center of heart in raw coords

let slots = [], revealed = 0, lastTime = 0, animId = null;
const INTERVAL_MS = 80;

function buildSlots(W, H) {
  slots = [];
  ctx.font = FONT;
  const pw = ctx.measureText(PHRASE).width;
  const ph = 15;

  // Use only 75% of screen so heart is smaller and never clips
  const scale = Math.min((W * 0.75) / RAW_W, (H * 0.75) / RAW_H);

  const cx = W / 2;
  const cy = H / 2 + RAW_CY * scale;

  const hw = pw / 2 + 2, hh = ph / 2 + 1;
  const placed = [];

  function overlaps(sx, sy) {
    for (const p of placed)
      if (Math.abs(sx - p.sx) < hw + p.hw && Math.abs(sy - p.sy) < hh + p.hh) return true;
    return false;
  }

  for (let i = 0; i < 12000; i++) {
    const t  = (i / 12000) * 2 * Math.PI;
    const sx = cx + heartX(t) * scale;
    const sy = cy - heartY(t) * scale;
    if (sx < pw/2 + 2 || sx > W - pw/2 - 2) continue;
    if (sy < ph/2 + 2 || sy > H - ph/2 - 2) continue;
    if (!overlaps(sx, sy)) {
      slots.push({ sx, sy });
      placed.push({ sx, sy, hw, hh });
    }
  }
}

function setup() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  buildSlots(canvas.width, canvas.height);
  revealed = 0; lastTime = 0;
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(tick);
}

function tick(ts) {
  if (revealed >= slots.length) return;
  if (ts - lastTime >= INTERVAL_MS) {
    const { sx, sy } = slots[revealed];
    ctx.font = FONT;
    ctx.fillStyle = COLOR;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(PHRASE, sx, sy);
    revealed++;
    lastTime = ts;
  }
  animId = requestAnimationFrame(tick);
}

window.addEventListener('resize', setup);
setup();
</script>
</body>
</html>
