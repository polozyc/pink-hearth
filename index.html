<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const PHRASE = 'I love you';
const COLOR  = '#ff5ca8';

function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
function heartY(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

// Exact raw bounding box (pre-calculated)
// rawX: -16 to +16  → rawW = 32
// rawY: -8.6588 to +12.3176  → rawH = 20.9764
// rawCX = 0, rawCY = (12.3176 + (-8.6588)) / 2 = 1.8294
const RAW_X_MIN = -16;
const RAW_X_MAX =  16;
const RAW_Y_MIN = -8.6588;
const RAW_Y_MAX =  12.3176;
const RAW_CX    = 0;
const RAW_CY    = (RAW_Y_MAX + RAW_Y_MIN) / 2; // 1.8294

let slots    = [];
let revealed = 0;
let lastTime = 0;
let animId   = null;
const INTERVAL_MS = 80;

function buildSlots(W, H) {
  slots = [];

  const FONT_SIZE = 11;
  const font = `${FONT_SIZE}px 'Courier New', monospace`;

  ctx.font = font;
  const pw = ctx.measureText(PHRASE).width; // ~66px at 11px
  const ph = FONT_SIZE * 1.5;

  // Margins: enough so text at the very edge doesn't clip
  const marginX = pw / 2 + 4;
  const marginY = ph / 2 + 4;

  const availW = W - marginX * 2;
  const availH = H - marginY * 2;

  // Scale to fit heart entirely inside available area
  const rawW = RAW_X_MAX - RAW_X_MIN; // 32
  const rawH = RAW_Y_MAX - RAW_Y_MIN; // ~20.98

  const scale = Math.min(availW / rawW, availH / rawH);

  // Screen center maps to raw center of heart
  const cx = W / 2 - RAW_CX * scale;         // = W/2 (since RAW_CX=0)
  const cy = H / 2 + RAW_CY * scale;         // shift down by raw center offset

  // Collision detection
  const hw = pw / 2 + 1;
  const hh = ph / 2 + 1;
  const placed = [];

  function overlaps(sx, sy) {
    for (const p of placed) {
      if (Math.abs(sx - p.sx) < hw + p.hw &&
          Math.abs(sy - p.sy) < hh + p.hh) return true;
    }
    return false;
  }

  const FINE = 12000;
  for (let i = 0; i < FINE; i++) {
    const t  = (i / FINE) * 2 * Math.PI;
    const sx = cx + heartX(t) * scale;
    const sy = cy - heartY(t) * scale;

    // Safety: never place outside canvas
    if (sx - pw/2 < 0 || sx + pw/2 > W) continue;
    if (sy - ph/2 < 0 || sy + ph/2 > H) continue;

    if (!overlaps(sx, sy)) {
      slots.push({ sx, sy, font });
      placed.push({ sx, sy, hw, hh });
    }
  }
}

function setup() {
  // Use screen.width/height as fallback to avoid browser chrome issues
  const cssW = window.innerWidth;
  const cssH = window.innerHeight;

  // Set canvas pixel size = CSS size (no dpr scaling — avoids miscalculation)
  canvas.width  = cssW;
  canvas.height = cssH;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cssW, cssH);

  buildSlots(cssW, cssH);
  revealed = 0;
  lastTime = 0;

  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(tick);
}

function tick(ts) {
  if (revealed >= slots.length) return;

  if (ts - lastTime >= INTERVAL_MS) {
    const { sx, sy, font } = slots[revealed];
    ctx.font         = font;
    ctx.fillStyle    = COLOR;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(PHRASE, sx, sy);
    revealed++;
    lastTime = ts;
  }

  animId = requestAnimationFrame(tick);
}

window.addEventListener('resize', setup);
setup();
</script>
</body>
</html>
