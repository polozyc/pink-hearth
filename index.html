<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    touch-action: none;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const PHRASE = 'I love you';
const COLOR  = '#ff5ca8';

function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
function heartY(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

let slots    = [];
let revealed = 0;
let lastTime = 0;
let animId   = null;
const INTERVAL_MS = 80;

function buildSlots() {
  slots = [];

  const W = canvas.width;
  const H = canvas.height;

  // Para tela de celular (portrait): usar largura como fator limitante
  const isPortrait = H > W;
  // Coração raw: width ≈ 32 units, height ≈ 20.8 units
  const rawW = 32;
  const rawH = 20.8;

  let scale;
  if (isPortrait) {
    // Limita pela largura: ocupa 88% da largura
    const scaleByW = (W * 0.88) / rawW;
    const scaleByH = (H * 0.72) / rawH;
    scale = Math.min(scaleByW, scaleByH);
  } else {
    scale = (H * 0.72) / rawH;
  }

  const cx = W / 2;
  const cy = H / 2 + 1.2 * scale;

  // Font size proporcional ao scale
  const fontSize = Math.max(9, Math.round(scale * 0.52));
  const font = `${fontSize}px 'Courier New', monospace`;

  ctx.font = font;
  const pw = ctx.measureText(PHRASE).width;
  const ph = fontSize * 1.3;
  const hw = pw / 2 + 2;
  const hh = ph / 2 + 1;

  const FINE = 8000;
  const placed = [];

  function overlaps(sx, sy) {
    for (const p of placed) {
      if (Math.abs(sx - p.sx) < hw + p.hw &&
          Math.abs(sy - p.sy) < hh + p.hh) return true;
    }
    return false;
  }

  for (let i = 0; i < FINE; i++) {
    const t  = (i / FINE) * 2 * Math.PI;
    const sx = cx + heartX(t) * scale;
    const sy = cy - heartY(t) * scale;
    if (!overlaps(sx, sy)) {
      slots.push({ sx, sy, font });
      placed.push({ sx, sy, hw, hh });
    }
  }
}

function setup() {
  // Usar devicePixelRatio para telas retina/OLED de celular
  const dpr = window.devicePixelRatio || 1;
  const cssW = window.innerWidth;
  const cssH = window.innerHeight;

  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  ctx.scale(dpr, dpr);

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cssW, cssH);

  buildSlots();
  revealed = 0;
  lastTime = 0;

  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(tick);
}

function tick(ts) {
  if (revealed >= slots.length) return;

  if (ts - lastTime >= INTERVAL_MS) {
    const { sx, sy, font } = slots[revealed];

    ctx.font         = font;
    ctx.fillStyle    = COLOR;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(PHRASE, sx, sy);

    revealed++;
    lastTime = ts;
  }

  animId = requestAnimationFrame(tick);
}

window.addEventListener('resize', setup);
setup();
</script>
</body>
</html>
