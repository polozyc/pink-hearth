<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const PHRASE = 'I love you';
const COLOR  = '#ff5ca8';
const FONT   = "11px 'Courier New', monospace";
const FONT_H = 13;

function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
function heartY(t) { return 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t); }

let W, H, scale, cx, cy;
let slots    = [];
let revealed = 0;
let lastTime = 0;
const INTERVAL_MS = 80; // ms entre cada "I love you" — ajuste aqui para mudar velocidade

function buildSlots() {
  slots = [];
  ctx.font = FONT;
  const pw = ctx.measureText(PHRASE).width;
  const ph = FONT_H;
  const hw = pw / 2 + 2;
  const hh = ph / 2 + 1;

  const FINE = 8000;
  const placed = [];

  function overlaps(sx, sy) {
    for (const p of placed) {
      if (Math.abs(sx - p.sx) < hw + p.hw &&
          Math.abs(sy - p.sy) < hh + p.hh) return true;
    }
    return false;
  }

  for (let i = 0; i < FINE; i++) {
    const t  = (i / FINE) * 2 * Math.PI;
    const sx = cx + heartX(t) * scale;
    const sy = cy - heartY(t) * scale;
    if (!overlaps(sx, sy)) {
      slots.push({ sx, sy });
      placed.push({ sx, sy, hw, hh });
    }
  }
}

function setup() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  scale = (H * 0.70) / 20.8;
  cx    = W / 2;
  cy    = H / 2 + 1.2 * scale;

  buildSlots();
  revealed = 0;
  lastTime = 0;
  requestAnimationFrame(tick);
}

function tick(ts) {
  if (revealed >= slots.length) return;

  if (ts - lastTime >= INTERVAL_MS) {
    const { sx, sy } = slots[revealed];

    ctx.font         = FONT;
    ctx.fillStyle    = COLOR;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(PHRASE, sx, sy);

    revealed++;
    lastTime = ts;
  }

  requestAnimationFrame(tick);
}

window.addEventListener('resize', setup);
setup();
</script>
</body>
</html>
